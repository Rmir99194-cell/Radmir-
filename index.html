<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1e2b 0%, #2d1f3a 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        .player {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .main-cover {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .main-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        
        .cover-overlay h2 {
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .cover-overlay p {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
        }
        
        .progress-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 6px;
            margin: 20px 0;
            cursor: pointer;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .time-info {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 5px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 25px 0;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .control-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }
        
        .play-btn {
            width: 65px;
            height: 65px;
            background: #ff6b6b;
            font-size: 30px;
            box-shadow: 0 5px 20px rgba(255,107,107,0.5);
        }
        
        .search-container {
            margin: 15px 0;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .search-input:focus {
            outline: none;
            border-color: #ff6b6b;
            background: rgba(255,255,255,0.15);
        }
        
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(20, 20, 30, 0.98);
            border-radius: 20px;
            margin-top: 10px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .search-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        
        .search-item:hover {
            background: rgba(255,107,107,0.2);
        }
        
        .search-item-info {
            flex: 1;
        }
        
        .search-item-info strong {
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
        }
        
        .search-item-info small {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }
        
        .search-add-btn {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 20px;
            margin: 30px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        .tab {
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            padding: 5px 0;
        }
        
        .tab.active {
            color: #ff6b6b;
            border-bottom: 2px solid #ff6b6b;
        }
        
        .playlist {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .playlist-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        
        .playlist-item.active {
            background: rgba(255,107,107,0.2);
            border-left: 3px solid #ff6b6b;
        }
        
        .item-cover {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .item-info p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        .item-duration {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            padding-right: 10px;
        }
        
        .add-btn {
            background: rgba(255,255,255,0.1);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin: 10px 0;
            cursor: pointer;
        }
        
        .empty-message {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
        }
        
        .results-count {
            padding: 10px 15px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="player">
        <div class="main-cover">
            <img id="currentCover" src="https://via.placeholder.com/400x400/ff6b6b/ffffff?text=🎵" alt="cover">
            <div class="cover-overlay">
                <h2 id="trackTitle">Выберите трек</h2>
                <p id="trackArtist">Нажмите на песню</p>
            </div>
        </div>
        
        <div class="progress-container" 
             onclick="seekUpdate(event)"
             onmousedown="seekStart(event)"
             onmousemove="seekUpdate(event)"
             onmouseup="seekEnd(event)"
             onmouseleave="seekEnd(event)"
             ontouchstart="seekStart(event)"
             ontouchmove="seekUpdate(event)"
             ontouchend="seekEnd(event)">
            <div class="progress" id="progressBar"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="prevTrack()">⏮</button>
            <button class="control-btn play-btn" id="playPauseBtn" onclick="playPause()">▶</button>
            <button class="control-btn" onclick="nextTrack()">⏭</button>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Найти песню или исполнителя...">
            <div class="search-results" id="searchResults"></div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('playlist')">📋 Плейлист</div>
            <div class="tab" onclick="showTab('favorites')">❤️ Избранное</div>
        </div>
        
        <div id="playlistView" class="playlist"></div>
        <div id="favoritesView" class="playlist" style="display: none;"></div>
    </div>
    
    <script>
        const tg = window.Telegram ? Telegram.WebApp : null;
        if (tg) tg.expand();
        
        // ========== ВСЯ МУЗЫКА С РЕАЛЬНЫМИ ССЫЛКАМИ ==========
        const tracks = [
            // Мияги
            { 
                id: 1,
                title: "Тамада", 
                artist: "Мияги & Эндшпиль", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-1.mp3",
                cover: "https://i.ytimg.com/vi/8uD4jNd_P7M/hqdefault.jpg",
                duration: "3:45"
            },
            { 
                id: 2,
                title: "I Got Love", 
                artist: "Мияги & Эндшпиль", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-2.mp3",
                cover: "https://i.ytimg.com/vi/mUGNwa6GjM8/hqdefault.jpg",
                duration: "4:20"
            },
            { 
                id: 3,
                title: "Самая", 
                artist: "Мияги", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-3.mp3",
                cover: "https://i.ytimg.com/vi/5B-z0x5wPcw/hqdefault.jpg",
                duration: "3:15"
            },
            { 
                id: 4,
                title: "Мама", 
                artist: "Мияги & Эндшпиль", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-4.mp3",
                cover: "https://i.ytimg.com/vi/lqA2Qr79z18/hqdefault.jpg",
                duration: "5:00"
            },
            { 
                id: 5,
                title: "Fire", 
                artist: "Мияги", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-5.mp3",
                cover: "https://i.ytimg.com/vi/5B-z0x5wPcw/hqdefault.jpg",
                duration: "4:45"
            },
            
            // Макс Корж
            { 
                id: 6,
                title: "Малиновый закат", 
                artist: "Макс Корж", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-1.mp3",
                cover: "https://i.ytimg.com/vi/2mX5bKY17z0/hqdefault.jpg",
                duration: "3:45"
            },
            { 
                id: 7,
                title: "Слово пацана", 
                artist: "Макс Корж", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-2.mp3",
                cover: "https://i.ytimg.com/vi/FmZ_6E7hVh0/hqdefault.jpg",
                duration: "4:20"
            },
            { 
                id: 8,
                title: "Жить в кайф", 
                artist: "Макс Корж", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-3.mp3",
                cover: "https://i.ytimg.com/vi/fNLVF1l20Jk/hqdefault.jpg",
                duration: "3:15"
            },
            
            // Баста
            { 
                id: 9,
                title: "Сансара", 
                artist: "Баста", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-4.mp3",
                cover: "https://i.ytimg.com/vi/KTP3z7is6iw/hqdefault.jpg",
                duration: "5:00"
            },
            { 
                id: 10,
                title: "Выпускной", 
                artist: "Баста", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-5.mp3",
                cover: "https://i.ytimg.com/vi/K7NmsMjt5cE/hqdefault.jpg",
                duration: "4:45"
            },
            
            // Скриптонит
            { 
                id: 11,
                title: "Ламбада", 
                artist: "Скриптонит", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-1.mp3",
                cover: "https://i.ytimg.com/vi/UHIH3izNK28/hqdefault.jpg",
                duration: "3:45"
            },
            { 
                id: 12,
                title: "Танцуй сама", 
                artist: "Скриптонит", 
                url: "https://cdn-upload.soundhelix.com/mp3/SoundHelix-Song-2.mp3",
                cover: "https://i.ytimg.com/vi/j87mnooXj7M/hqdefault.jpg",
                duration: "4:20"
            }
        ];
        
        let currentTrack = 0;
        let isPlaying = false;
        let audio = new Audio();
        let favorites = [];
        let isDragging = false;
        
        try {
            const saved = localStorage.getItem('favorites');
            if (saved) favorites = JSON.parse(saved);
        } catch(e) {}
        
        // ========== ПОИСК ==========
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        
        function searchMusic(query) {
            if (!query || query.length < 1) {
                searchResults.style.display = 'none';
                return;
            }
            
            query = query.toLowerCase().trim();
            
            const results = tracks.filter(track => 
                track.title.toLowerCase().includes(query) || 
                track.artist.toLowerCase().includes(query)
            );
            
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="empty-message">❌ Ничего не найдено</div>';
                searchResults.style.display = 'block';
                return;
            }
            
            let html = `<div class="results-count">Найдено ${results.length} треков</div>`;
            
            results.forEach(track => {
                html += `
                    <div class="search-item" onclick="playTrackFromSearch(${track.id})">
                        <div class="search-item-info">
                            <strong>${track.title}</strong>
                            <small>${track.artist}</small>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <div class="search-add-btn" onclick="addToFavoritesFromSearch(${track.id}); event.stopPropagation()">❤️</div>
                            <div style="color: rgba(255,255,255,0.4);">${track.duration}</div>
                        </div>
                    </div>
                `;
            });
            
            searchResults.innerHTML = html;
            searchResults.style.display = 'block';
        }
        
        function playTrackFromSearch(trackId) {
            const trackIndex = tracks.findIndex(t => t.id === trackId);
            if (trackIndex !== -1) {
                playTrack(trackIndex);
                searchResults.style.display = 'none';
                searchInput.value = '';
            }
        }
        
        function addToFavoritesFromSearch(trackId) {
            const trackIndex = tracks.findIndex(t => t.id === trackId);
            if (trackIndex !== -1) {
                addToFavorites(trackIndex);
            }
        }
        
        searchInput.addEventListener('input', function(e) {
            searchMusic(e.target.value);
        });
        
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });
        
        function showPlaylist() {
            const container = document.getElementById('playlistView');
            container.innerHTML = '';
            
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item' + (index === currentTrack ? ' active' : '');
                item.innerHTML = `
                    <div class="item-cover">🎵</div>
                    <div class="item-info">
                        <h4>${track.title}</h4>
                        <p>${track.artist}</p>
                    </div>
                    <div class="item-duration">${track.duration}</div>
                `;
                item.onclick = () => playTrack(index);
                container.appendChild(item);
            });
        }
        
        function showFavorites() {
            const container = document.getElementById('favoritesView');
            
            if (favorites.length === 0) {
                container.innerHTML = '<div class="empty-message">❤️ Нет избранных треков</div>';
                return;
            }
            
            container.innerHTML = '';
            
            favorites.forEach((trackIndex, favIndex) => {
                const track = tracks[trackIndex];
                if (!track) return;
                
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.innerHTML = `
                    <div class="item-cover">❤️</div>
                    <div class="item-info">
                        <h4>${track.title}</h4>
                        <p>${track.artist}</p>
                    </div>
                    <div class="item-duration" onclick="removeFromFavorites(${favIndex}); event.stopPropagation()">✖️</div>
                `;
                item.onclick = () => playTrack(trackIndex);
                container.appendChild(item);
            });
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.playlist').forEach(p => p.style.display = 'none');
            searchResults.style.display = 'none';
            
            if (tab === 'playlist') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('playlistView').style.display = 'flex';
                showPlaylist();
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('favoritesView').style.display = 'flex';
                showFavorites();
            }
        }
        
        function addToFavorites(trackIndex) {
            if (!favorites.includes(trackIndex)) {
                favorites.push(trackIndex);
                localStorage.setItem('favorites', JSON.stringify(favorites));
                alert(`❤️ Добавлено в избранное!`);
                if (document.querySelector('.tab.active').innerText.includes('❤️')) {
                    showFavorites();
                }
            }
        }
        
        function removeFromFavorites(index) {
            favorites.splice(index, 1);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            showFavorites();
        }
        
        function playTrack(index) {
            currentTrack = index;
            const track = tracks[index];
            
            document.getElementById('trackTitle').textContent = track.title;
            document.getElementById('trackArtist').textContent = track.artist;
            document.getElementById('currentCover').src = track.cover;
            
            audio.src = track.url;
            audio.play();
            isPlaying = true;
            document.getElementById('playPauseBtn').textContent = '⏸';
            
            showPlaylist();
        }
        
        function playPause() {
            if (!audio.src) {
                playTrack(0);
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                document.getElementById('playPauseBtn').textContent = '▶';
            } else {
                audio.play();
                document.getElementById('playPauseBtn').textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }
        
        function nextTrack() {
            let next = (currentTrack + 1) % tracks.length;
            playTrack(next);
        }
        
        function prevTrack() {
            let prev = (currentTrack - 1 + tracks.length) % tracks.length;
            playTrack(prev);
        }
        
        function seekStart(event) {
            isDragging = true;
            seekUpdate(event);
        }
        
        function seekUpdate(event) {
            if (!isDragging && event.type !== 'click') return;
            if (!audio.duration) return;
            
            let clientX;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                event.preventDefault();
            } else {
                clientX = event.clientX;
            }
            
            const rect = document.querySelector('.progress-container').getBoundingClientRect();
            let pos = (clientX - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            
            document.getElementById('progressBar').style.width = (pos * 100) + '%';
            
            if (event.type === 'click' || event.type === 'touchend') {
                audio.currentTime = pos * audio.duration;
                isDragging = false;
            }
        }
        
        function seekEnd(event) {
            if (!isDragging) return;
            if (!audio.duration) return;
            
            const rect = document.querySelector('.progress-container').getBoundingClientRect();
            let clientX = event.changedTouches ? event.changedTouches[0].clientX : event.clientX;
            let pos = (clientX - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            
            audio.currentTime = pos * audio.duration;
            isDragging = false;
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        audio.ontimeupdate = function() {
            if (audio.duration && !isDragging) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
            }
        };
        
        audio.onloadedmetadata = function() {
            document.getElementById('duration').textContent = formatTime(audio.duration);
        };
        
        audio.onended = function() {
            nextTrack();
        };
        
        showPlaylist();
    </script>
</body>
</html>
